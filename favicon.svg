<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fondo naranja con esquinas redondeadas tipo app icon -->
  <rect width="200" height="200" rx="32" ry="32" fill="#FD801D"/>
  <!-- 4 hexágonos outer en cream -->
  <polygon points="60,50 50,67.32 30,67.32 20,50 30,32.68 50,32.68"          fill="#F5F1EA"/>
  <polygon points="180,50 170,67.32 150,67.32 140,50 150,32.68 170,32.68"    fill="#F5F1EA"/>
  <polygon points="90,95 80,112.32 60,112.32 50,95 60,77.68 80,77.68"        fill="#F5F1EA"/>
  <polygon points="150,95 140,112.32 120,112.32 110,95 120,77.68 140,77.68"  fill="#F5F1EA"/>
  <!-- Hexágono núcleo en ink -->
  <polygon points="120,145 110,162.32 90,162.32 80,145 90,127.68 110,127.68" fill="#16140F"/>
  <!-- Punto del núcleo en cream -->
  <circle cx="100" cy="145" r="5" fill="#F5F1EA"/>
